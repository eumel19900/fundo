<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="Search">
  <title>Search</title>
  <rect width="100%" height="100%" rx="32" ry="32" fill="#0B5FFF"/>

  <!-- magnifying glass -->
  <g transform="translate(40,36) scale(1.12)">
    <!-- lens -->
    <circle cx="88" cy="80" r="56" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-width="10"/>
    <!-- handle -->
    <rect x="130" y="132" width="16" height="70" rx="8" ry="8" transform="rotate(45 138 167)" fill="#ffffff"/>
    <!-- inner highlight -->
    <circle cx="72" cy="66" r="20" fill="#ffffff" fill-opacity="0.18"/>
  </g>

  <!-- subtle drop shadow -->
  <ellipse cx="128" cy="210" rx="70" ry="10" fill="#000000" fill-opacity="0.12"/>
</svg>